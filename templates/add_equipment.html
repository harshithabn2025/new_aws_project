<!DOCTYPE html>
<html>
<head>
    <title>Add Equipment</title>
</head>

<body>

<h2>Add Equipment</h2>

<form method="POST">

    <input type="text" name="equipment_name" placeholder="Equipment Name" required><br><br>

    <input type="text" name="serial_number" placeholder="Serial Number" required><br><br>

    <input type="text" name="department" placeholder="Department" required><br><br>

    <input type="date" name="purchase_date" required><br><br>

    <select name="status">
        <option value="Active">Active</option>
        <option value="Under Maintenance">Under Maintenance</option>
    </select><br><br>

    <button type="submit">Save</button>

</form>

</body>
</html>
