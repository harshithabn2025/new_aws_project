<!DOCTYPE html>
<html>
<head>
    <title>MediTrack</title>
</head>
<body>

<h1>MediTrack Dashboard</h1>

<a href="{{ url_for('add_equipment') }}">Add Equipment</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Quantity</th>
        <th>Actions</th>
    </tr>

    {% for item in equipment %}
    <tr>
        <td>{{ item.id }}</td>
        <td>{{ item.name }}</td>
        <td>{{ item.quantity }}</td>
        <td>
            <a href="{{ url_for('edit_equipment', id=item.id) }}">Edit</a>
            <a href="{{ url_for('delete_equipment', id=item.id) }}">Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
